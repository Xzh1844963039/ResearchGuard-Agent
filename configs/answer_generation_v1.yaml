answer_generation:
  enabled: false
  backend: "openai"
  model: "gpt-4.1-mini"
  temperature: 0
  timeout: 30
  max_retries: 2
  max_tokens: 800
  prompt_version: "answer_generation_v1.1"
  config_version: "answer_generation_v1.0"
  cache_enabled: true
  cache_directory: "data/cache/answer_generation_v1"
  max_evidence_chunks: 10
  max_chars_per_chunk: 1800

validation:
  benchmark_path: "data/eval/answer_generation_v1_queries.jsonl"
  retrieval_config_path: "configs/retrieval_v1.yaml"
  evidence_config_path: "configs/evidence_sufficiency_v1.yaml"
  output_directory: "outputs/answer_generation_validation_v1"
  retrieval_candidate_k: 80
  rerank_candidate_k: 20
  evidence_top_k: 10
  rewrite_enabled: true
  multi_query_enabled: true
