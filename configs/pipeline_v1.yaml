pipeline:
  schema_version: "researchguard_pipeline_v1"
  config_version: "pipeline_v1.0"
  read_cache: true
  include_retrieval_text: true

  modules:
    rewrite:
      enabled: true
      multi_query: true

    retrieval:
      enabled: true
      config_path: "configs/retrieval_v1.yaml"
      mode: "hybrid"
      top_k: 10
      candidate_k: 80

    reranker:
      enabled: true
      candidate_k: 20

    evidence_check:
      enabled: true
      config_path: "configs/evidence_sufficiency_v1.yaml"

    answer_generation:
      enabled: true
      config_path: "configs/answer_generation_v1.yaml"

    citation_audit:
      enabled: true
      config_path: "configs/citation_audit_v1.yaml"

validation:
  output_directory: "outputs/pipeline_validation_v1"
  sufficient_query: "What is the difference between RAG-Sequence and RAG-Token?"
  unsupported_query: "Does any indexed paper describe quantum error correction for superconducting qubits?"
  partial_query: "Does CRAG use a lightweight retrieval evaluator and GPT-5 to judge retrieved documents?"
