citation_audit:
  enabled: false
  backend: "openai"
  model: "gpt-4.1-mini"
  temperature: 0
  timeout: 30
  max_retries: 2
  max_tokens: 900
  extraction_prompt_version: "claim_extraction_v1.1"
  verification_prompt_version: "claim_verification_v1.2"
  config_version: "citation_audit_v1.1"
  cache_enabled: true
  cache_directory: "data/cache/citation_audit_v1"
  max_claims: 20
  max_evidence_chunks_per_claim: 10
  max_chars_per_chunk: 1800

validation:
  benchmark_path: "data/eval/citation_audit_v1_queries.jsonl"
  retrieval_config_path: "configs/retrieval_v1.yaml"
  evidence_config_path: "configs/evidence_sufficiency_v1.yaml"
  answer_config_path: "configs/answer_generation_v1.yaml"
  output_directory: "outputs/citation_audit_validation_v1"
  integration_query: "What is the difference between RAG-Sequence and RAG-Token?"
  retrieval_candidate_k: 80
  rerank_candidate_k: 20
  top_k: 10
